# ~/.aerospace.toml

# ==========================================
# 1. GLOBAL SETTINGS 
# ==========================================

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ==========================================
# 2. GAPS 
# ==========================================
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.top = 10
outer.bottom = 10
outer.left = 10
outer.right = 10

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'secondary'
6 = 'main'
7 = 'main'
8 = 'main'
9 = 'main'

[mode.main.binding]

# Focus (lalt - h/j/k/l)
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'
alt-n = 'workspace-back-and-forth'

# Move / Swap (shift + lalt - h/j/k/l)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Float, Tiling, Split
alt-f = 'fullscreen'
alt-t = 'layout floating tiling' # toggle float
# alt-r = 'layout tiles horizontal vertical'     # toggle split
# alt-w = 'layout accordion horizontal vertical'
alt-w = 'layout h_accordion'               # Tabbed (i3)
alt-s = 'layout v_accordion'               # Stacking (i3)
alt-e = 'layout tiles horizontal vertical' # Toggle Split (i3)

# Workspaces
alt-1 = [
  'workspace 1',
  'exec-and-forget bash -c "sleep 0.05 && aerospace workspace 1"',
]
alt-2 = [
  'workspace 2',
  'exec-and-forget bash -c "sleep 0.05 && aerospace workspace 2"',
]
alt-3 = [
  'workspace 3',
  'exec-and-forget bash -c "sleep 0.05 && aerospace workspace 3"',
]
alt-4 = [
  'workspace 4',
  'exec-and-forget bash -c "sleep 0.05 && aerospace workspace 4"',
]
alt-5 = [
  'workspace 5',
  'exec-and-forget bash -c "sleep 0.05 && aerospace workspace 4"',
]
# alt-1 = 'workspace 1'
# alt-2 = 'workspace 2'
# alt-3 = 'workspace 3'
# alt-4 = 'workspace 4'
# alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-minus = 'workspace S'

# Move window to Workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-minus = 'move-node-to-workspace S'

cmd-shift-h = 'focus-monitor left'
cmd-shift-l = 'focus-monitor right'
alt-shift-n = 'move-node-to-monitor next'
alt-shift-p = 'move-node-to-monitor prev'

alt-shift-ctrl-h = 'join-with left'
alt-shift-ctrl-j = 'join-with down'
alt-shift-ctrl-k = 'join-with up'
alt-shift-ctrl-l = 'join-with right'

alt-r = 'mode resize'
alt-shift-c = 'reload-config'

# alt-u = 'resize width -40'
# alt-p = 'resize width +40'
# alt-o = 'resize height -40'
# alt-i = 'resize height +40'

[mode.resize.binding]
h = 'resize width -40'
j = 'resize height +40'
k = 'resize height -40'
l = 'resize width +40'
enter = 'mode main'
esc = 'mode main'

[[on-window-detected]]
if.app-name-regex-substring = 'System Settings|Stats|Archive Utility|Wally|Pika|balenaEtcher|Creative Cloud|Logi Options|Alfred Preferences|Raycast|appRX8-HMI-DISPLAY|Music'
run = ['layout floating']
